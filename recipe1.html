<body>
    <h1>Молоко: 500–900 мл
    Яйца: 2–4 штуки (в зависимости от объема молока)
    Cука пшеничная: 150–200 г (примерно 1–1,5 стакана)
    Сахар: 1–2 ст. ложки (по вкусу)
    Растительное масло: 2–3 ст. ложки (в тесто, чтобы блины не прилипали)
    Соль: щепотка 
</h1>
